<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View your EV charging profile, session history, and environmental impact stats.">
    <title>EVFinder — My Profile</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#1D9E75"/><path d="M18 6L10 18h5l-1 8 8-12h-5l1-8z" fill="white" stroke="white" stroke-width="0.5" stroke-linejoin="round"/></svg>
            EVFinder
        </a>
        <button class="mobile-menu-btn" onclick="document.querySelector('.navbar-links').classList.toggle('open')">☰</button>
        <ul class="navbar-links">
            <li><a href="index.html">🗺️ Map</a></li>
            <li><a href="calculator.html">🔋 Calculator</a></li>
            <li><a href="profile.html" class="active">👤 Profile</a></li>
        </ul>
    </nav>

    <div class="page-container">
        <h1 class="page-title">👤 My Profile</h1>
        <p class="page-subtitle">Track your charging sessions and environmental impact</p>

        <!-- User & Vehicle Selector -->
        <div class="user-selector">
            <div class="form-group" style="margin-bottom:0;flex:1;min-width:200px;">
                <label class="form-label">Select User</label>
                <select id="profileUser" class="form-control" onchange="onUserChange()">
                    <option value="">Select User</option>
                    <option value="1">Aarav Sharma</option>
                    <option value="2">Priya Patil</option>
                    <option value="3">Rohan Deshmukh</option>
                    <option value="4">Sneha Kulkarni</option>
                    <option value="5">Vikram Jadhav</option>
                    <option value="6">Anjali More</option>
                    <option value="7">Rahul Gaikwad</option>
                    <option value="8">Meera Joshi</option>
                    <option value="9">Arjun Bhosale</option>
                    <option value="10">Kavya Pawar</option>
                    <option value="11">Siddharth Wagh</option>
                    <option value="12">Diya Chavan</option>
                    <option value="13">Aditya Shinde</option>
                    <option value="14">Pooja Mane</option>
                    <option value="15">Kunal Deshpande</option>
                    <option value="16">Isha Sawant</option>
                    <option value="17">Om Thakur</option>
                    <option value="18">Tanvi Rajput</option>
                    <option value="19">Yash Nikam</option>
                    <option value="20">Nisha Kale</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom:0;flex:1;min-width:200px;">
                <label class="form-label">Your Vehicle</label>
                <select id="profileVehicle" class="form-control">
                    <option value="">Loading vehicles...</option>
                </select>
            </div>
        </div>

        <!-- Stats Cards -->
        <div id="statsCards" class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">⚡</div>
                <div class="stat-value" id="statKwh">0</div>
                <div class="stat-label">kWh This Month</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-value" id="statSpend">₹0</div>
                <div class="stat-label">Total Spend</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🌱</div>
                <div class="stat-value" id="statCo2">0 kg</div>
                <div class="stat-label">CO₂ Saved</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔋</div>
                <div class="stat-value" id="statSessions">0</div>
                <div class="stat-label">Total Sessions</div>
            </div>
        </div>

        <!-- Session History -->
        <div class="section">
            <h2 class="section-title">📋 Charging Session History</h2>
            <div id="sessionTable">
                <p style="color:var(--text-muted);text-align:center;padding:40px;">Select a user to view session history</p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        let allVehicles = [];

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                allVehicles = await api.getVehicles();
                const select = document.getElementById('profileVehicle');
                select.innerHTML = '<option value="">Select Vehicle</option>';
                allVehicles.forEach(v => {
                    select.innerHTML += `<option value="${v.vehicle_id}">${v.brand} ${v.model} (${v.battery_capacity} kWh, ${v.segment})</option>`;
                });
            } catch (e) {
                console.error(e);
            }
        });

        async function onUserChange() {
            const userId = document.getElementById('profileUser').value;
            if (!userId) return;

            // Auto-select vehicle if user has one (user_id 1-10 map to vehicle_id 1-10)
            const userVehicle = allVehicles.find(v => v.user_id == userId);
            if (userVehicle) {
                document.getElementById('profileVehicle').value = userVehicle.vehicle_id;
            }

            try {
                const sessions = await api.getUserSessions(userId);
                renderStats(sessions);
                renderSessionTable(sessions);
            } catch (e) {
                console.error(e);
                showToast('Failed to load sessions', 'error');
            }
        }

        function renderStats(sessions) {
            const now = new Date();
            const thisMonth = sessions.filter(s => {
                const d = new Date(s.start_time);
                return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            });

            const totalKwh = sessions.reduce((sum, s) => sum + (parseFloat(s.energy_consumed) || 0), 0);
            const monthKwh = thisMonth.reduce((sum, s) => sum + (parseFloat(s.energy_consumed) || 0), 0);
            const totalSpend = sessions.reduce((sum, s) => sum + (parseFloat(s.total_cost) || 0), 0);
            const co2Saved = totalKwh * 0.82;

            document.getElementById('statKwh').textContent = monthKwh.toFixed(1);
            document.getElementById('statSpend').textContent = '₹' + totalSpend.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            document.getElementById('statCo2').textContent = co2Saved.toFixed(1) + ' kg';
            document.getElementById('statSessions').textContent = sessions.length;
        }

        function renderSessionTable(sessions) {
            const container = document.getElementById('sessionTable');

            if (!sessions.length) {
                container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:40px;">No charging sessions found for this user.</p>';
                return;
            }

            container.innerHTML = `
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Station</th>
                                <th>kWh Charged</th>
                                <th>Cost (₹)</th>
                                <th>Duration</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${sessions.map(s => `
                                <tr>
                                    <td>${formatDate(s.start_time)}</td>
                                    <td>${s.station_name || 'Unknown'}</td>
                                    <td>${parseFloat(s.energy_consumed || 0).toFixed(1)} kWh</td>
                                    <td>${formatCurrency(s.total_cost)}</td>
                                    <td>${s.duration_minutes ? s.duration_minutes + ' min' : '-'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
    </script>
</body>
</html>
