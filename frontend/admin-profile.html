<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Administrator profile and assigned station details for EVFinder.">
    <title>EVFinder - Admin Profile</title>
    <link rel="stylesheet" href="css/style.css?v=9">
</head>
<body>
    <nav class="navbar">
        <a href="admin.html" class="navbar-brand">
            <svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#1D9E75"/><path d="M18 6L10 18h5l-1 8 8-12h-5l1-8z" fill="white" stroke="white" stroke-width="0.5" stroke-linejoin="round"/></svg>
            EVFinder
        </a>
        <button class="mobile-menu-btn" onclick="document.querySelector('.navbar-links').classList.toggle('open')">Menu</button>
        <ul class="navbar-links">
            <li><a href="admin.html">Admin</a></li>
            <li><a href="admin-profile.html" class="active">Profile</a></li>
        </ul>
    </nav>

    <main class="page-container admin-page">
        <h1 class="page-title">Administrator Profile</h1>
        <p class="page-subtitle">Account details and assigned station information.</p>

        <div class="profile-layout">
            <div class="card profile-card">
                <h2 class="card-header">Account Details</h2>
                <div id="adminProfileDetails" class="profile-field-grid">
                    <p style="color:var(--text-muted);">Loading profile...</p>
                </div>
            </div>

            <div class="card profile-card">
                <h2 class="card-header">Assigned Station</h2>
                <div id="adminStationDetails" class="profile-field-grid">
                    <p style="color:var(--text-muted);">Loading station...</p>
                </div>
            </div>
        </div>

        <div id="adminProfileStats" class="stats-grid">
            <div class="spinner"></div>
        </div>
    </main>

    <script src="js/api.js?v=11"></script>
    <script src="js/admin-profile.js"></script>
</body>
</html>
