<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Find EV charging stations near you in Pune. Real-time availability, fast and slow chargers, GPS navigation.">
    <title>EVFinder — Find EV Charging Stations Near You</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { overflow: hidden; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="32" height="32" rx="8" fill="#1D9E75"/>
                <path d="M18 6L10 18h5l-1 8 8-12h-5l1-8z" fill="white" stroke="white" stroke-width="0.5" stroke-linejoin="round"/>
            </svg>
            EVFinder
        </a>
        <button class="mobile-menu-btn" onclick="document.querySelector('.navbar-links').classList.toggle('open')">☰</button>
        <ul class="navbar-links">
            <li><a href="index.html" class="active">🗺️ Map</a></li>
            <li><a href="calculator.html">🔋 Calculator</a></li>
            <li><a href="profile.html">👤 Profile</a></li>
        </ul>
    </nav>

    <!-- Search Bar -->
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 Search station by name or city..." onkeyup="if(event.key==='Enter')searchStation()">
    </div>

    <!-- Map Filter Controls -->
    <div class="map-controls">
        <div class="filter-group" style="flex-direction:column;">
            <button class="filter-btn active" data-filter="all" onclick="filterStations('all')">⚡ All Stations</button>
            <button class="filter-btn" data-filter="fast" onclick="filterStations('fast')">🚀 Fast Chargers</button>
            <button class="filter-btn" data-filter="slow" onclick="filterStations('slow')">🐢 Slow Chargers</button>
        </div>
    </div>

    <!-- Map -->
    <div id="map"></div>

    <!-- Emergency Button -->
    <button class="btn btn-danger emergency-btn" onclick="findNearestFast()">
        🚨 Find Nearest Fast Charger NOW
    </button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/api.js?v=8"></script>
    <script src="js/map.js?v=8"></script>
</body>
</html>
